video_url: "https://example.com/public-lecture-video"
run_id: "sample_run"
output_dir: "outputs"

preferred_subtitle_languages: ["en", "zh-Hans", "zh", "zh-CN"]
output_language: "zh-CN"

target_video_height: 1080
min_video_height: 1080
allow_video_resolution_fallback: false
yt_dlp_format:
min_keyframe_height: 1080

transcription_backend: "faster-whisper"
transcription_model: "base"
transcription_device: "cpu"
transcription_compute_type: "int8"
transcription_language:
transcription_smoke_seconds:

frame_interval_seconds: 10
frame_smoke_seconds:
max_keyframes: 30
min_visual_difference_score: 0.12
min_stable_duration_seconds: 20
min_frame_variance: 2.0
min_sharpness_score: 1.5
dark_frame_mean_threshold: 5
bright_frame_mean_threshold: 250
solid_frame_variance_threshold: 2
duplicate_similarity_threshold: 0.92
duplicate_hash_distance_threshold: 0.08
animation_collapse_enabled: true
collapse_window_seconds: 90
build_group_max_gap_seconds: 40
max_intermediate_keyframes_per_group: 1
build_group_similarity_threshold: 0.45
build_group_hash_distance_threshold: 0.35
min_scene_change_score: 0.55
final_state_preference: "fuller_final_state"
collapse_report_enabled: true
fuller_state_scoring_enabled: true
fuller_state_weight: 1.0
time_preference_weight: 0.08
content_area_weight: 0.45
detail_density_weight: 0.25
layout_richness_weight: 0.30
conservative_group_merge_enabled: true
group_merge_max_gap_seconds: 150
group_merge_min_continuity_score: 0.72
title_region_max_difference: 0.14
fuller_replacement_min_delta: 0.01
report_group_decisions_limit: 200
final_state_trace_enabled: true
final_state_trace_report_limit: 50
low_content_lookahead_enabled: true
low_content_lookahead_seconds: 180
low_content_content_area_threshold: 0.12
low_content_detail_density_threshold: 0.10
low_content_layout_richness_threshold: 0.30
low_content_title_region_max_difference: 0.22
low_content_slide_region_max_difference: 0.70
title_only_penalty_enabled: true
title_slide_keep_policy: "keep_if_no_fuller_same_context"
group_fullness_reset_min_delta: 0.18
strong_title_region_max_difference: 0.08
strong_title_group_merge_max_gap_seconds: 300
strong_title_build_group_hash_distance_threshold: 0.45
adaptive_rescan_enabled: false
adaptive_rescan_interval_seconds: 2
adaptive_rescan_window_seconds: 90
comparison_region_mode: "full_frame"
comparison_center_crop_percent: 1.0
comparison_crop_left:
comparison_crop_top:
comparison_crop_right:
comparison_crop_bottom:
ocr_backend: "none"
ocr_language:
ocr_max_chars: 500
ocr_min_text_length: 4

generate_content_map: true
generate_review_report: true
generate_lecture_handout: true

content_generation_backend: "none"
content_generation_backend_mode: "skeleton"
generate_llm_prompt_pack: true
llm_prompt_pack_path: "audit/handout_prompt_pack.jsonl"

content_unit_max_gap_seconds: 45
content_unit_max_duration_seconds: 240
content_unit_min_transcript_chars: 80

handout_max_images_per_unit: 1
handout_near_duplicate_image_policy: "keep_one_representative"
handout_prefer_fuller_state: true
handout_include_timestamps: true
handout_include_generated_notice: true
handout_min_image_spacing_seconds: 45
handout_near_duplicate_max_gap_seconds: 40
handout_near_duplicate_max_difference: 0.20
handout_rapid_burst_window_seconds: 60
handout_rapid_burst_min_frames: 3

llm_api_style: "none"
llm_base_url:
llm_model:
llm_api_key_env:
llm_temperature: 0.2
llm_max_input_chars_per_unit: 6000
llm_max_excerpt_chars_per_item: 800
llm_max_output_tokens: 1200
llm_timeout_seconds: 60
llm_max_retries: 2
llm_concurrency: 1
llm_save_raw_responses: false
llm_allow_network_calls: false
unsupported_backend_behavior: "fail_closed"
